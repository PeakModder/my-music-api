<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Music App</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  margin-bottom: 10px;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

button {
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #2563eb;
  color: white;
  cursor: pointer;
}

.card {
  background: #1e293b;
  padding: 12px;
  border-radius: 10px;
  margin-top: 10px;
  display: flex;
  gap: 10px;
  align-items: center;
  cursor: pointer;
}

.card:hover {
  background: #334155;
}

img {
  width: 70px;
  border-radius: 6px;
}

.player-bar {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #020617;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

</style>
</head>

<body>

<div class="container">
  <h2>🎵 Music App</h2>

  <input id="searchInput" placeholder="Search music..." />

  <div class="buttons">
    <button onclick="fetchData('songs')">Songs</button>
    <button onclick="fetchData('videos')">Videos</button>
    <button onclick="fetchData('search')">All</button>
  </div>

  <div id="results"></div>
</div>

<!-- Hidden YouTube player -->
<div id="player"></div>

<!-- Player UI -->
<div class="player-bar">
  <span id="nowPlaying">Nothing playing</span>

  <div>
    <button onclick="togglePlay()">⏯️</button>
  </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
const API = "https://my-music-api-production-8e21.up.railway.app";

let player;
let isPlaying = false;

function onYouTubeIframeAPIReady() {
  player = new YT.Player('player', {
    height: '0',
    width: '0',
    videoId: '',
    playerVars: { autoplay: 1 }
  });
}

async function fetchData(type) {
  const query = document.getElementById("searchInput").value;
  if (!query) return alert("Enter search");

  const res = await fetch(`${API}/${type}?q=${encodeURIComponent(query)}`);
  const data = await res.json();

  let items = data;
  if (type === "search") items = data.results;

  displayResults(items);
}

function displayResults(items) {
  const container = document.getElementById("results");
  container.innerHTML = "";

  items.forEach(item => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${item.thumbnail}">
      <div>
        <div><b>${item.title}</b></div>
        <small>${item.artist}</small>
      </div>
    `;

    div.onclick = () => playSong(item);

    container.appendChild(div);
  });
}

function playSong(item) {
  if (!item.videoId) return;

  player.loadVideoById(item.videoId);
  isPlaying = true;

  document.getElementById("nowPlaying").innerText =
    "Playing: " + item.title;
}

function togglePlay() {
  if (!player) return;

  if (isPlaying) {
    player.pauseVideo();
    isPlaying = false;
  } else {
    player.playVideo();
    isPlaying = true;
  }
}
</script>

</body>
</html>
